name: Upload — Asia

on:
  schedule:
    - cron: '30 15 * * 1-5'   # Weekdays  — 9:00 PM IST
    - cron: '30 5  * * 0,6'   # Weekends  — 11:00 AM IST
  workflow_dispatch:
    inputs:
      audience:
        description: 'Target audience override'
        default: 'asia'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg and fonts
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-noto-color-emoji fonts-dejavu

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_JSON }}" | base64 -d > youtube_token.json
          echo "✓ youtube_token.json restored"

      - name: Restore client secret
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}" | base64 -d > client_secret.json
          echo "✓ client_secret.json restored"

      - name: Run pipeline — Asia audience
        env:
          TARGET_AUDIENCE:         asia
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          EMAIL_SENDER:            ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD:      ${{ secrets.EMAIL_APP_PASSWORD }}
          PEXELS_API_KEY:          ${{ secrets.PEXELS_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN:  ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:       ${{ secrets.INSTAGRAM_USER_ID }}
          FACEBOOK_ACCESS_TOKEN:   ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:        ${{ secrets.FACEBOOK_PAGE_ID }}
        run: python pipeline.py

      - name: Clean up secrets
        if: always()
        run: rm -f youtube_token.json client_secret.json
