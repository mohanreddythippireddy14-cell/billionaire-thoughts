name: Wisdom Quotes - Daily Upload

on:
  schedule:
    - cron: "0 2 * * *"   # 7:30 AM IST
    - cron: "0 9 * * *"   # 2:30 PM IST
    - cron: "0 14 * * *"  # 7:30 PM IST
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg and fonts
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-dejavu fontconfig
          fc-cache -fv

      - name: Install Python dependencies
        run: pip install -r requirements.txt Pillow

      - name: Restore YouTube token
        run: |
          echo "${{ secrets.WISDOM_YOUTUBE_TOKEN_JSON }}" | base64 -d > youtube_token.json
          echo "✓ youtube_token.json restored"

      - name: Restore client secret
        run: |
          echo "${{ secrets.WISDOM_YOUTUBE_CLIENT_SECRET_JSON }}" | base64 -d > client_secret.json
          echo "✓ client_secret.json restored"

      - name: Run pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          CHANNEL_NAME: "WisdomQuotes"
        run: python -m wisdom_quotes.pipeline

      - name: Commit used_quotes.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add wisdom_quotes/used_quotes.json
          git diff --cached --quiet || git commit -m "chore: update used quotes tracker"
          git push

      - name: Clean up secrets
        if: always()
        run: rm -f youtube_token.json client_secret.json
