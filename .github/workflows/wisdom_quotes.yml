name: Wisdom Quotes - Daily Upload

on:
  schedule:
    - cron: "0 14 * * *"  # 7:30 PM IST daily
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests google-auth google-auth-oauthlib google-api-python-client

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.WISDOM_YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.WISDOM_YOUTUBE_CLIENT_SECRET_JSON }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          CHANNEL_NAME: "WisdomQuotes"
        run: python -m wisdom_quotes.pipeline

      - name: Commit used_quotes.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add wisdom_quotes/used_quotes.json
          git diff --cached --quiet || git commit -m "chore: update used quotes tracker"
          git push
